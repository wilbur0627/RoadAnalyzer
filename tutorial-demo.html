<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<title>RoadAnalyzer Tutorial Demo</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: 1280px; height: 800px; overflow: hidden;
    background: #0a0a0f; position: relative;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }

  /* ── Phone frame with game screenshot ── */
  .phone-frame {
    position: absolute; left: 80px; top: 50%; transform: translateY(-50%);
    width: 360px; height: 740px;
    border-radius: 36px; overflow: hidden;
    border: 4px solid #333;
    box-shadow: 0 20px 60px rgba(0,0,0,0.7);
  }
  .game-img {
    width: 100%; height: 100%;
    object-fit: cover; object-position: top center;
  }

  /* ── Popup images ── */
  .popup-img {
    position: absolute;
    top: 50%; right: 140px; transform: translateY(-50%);
    height: 600px; width: auto;
    border-radius: 16px;
    box-shadow: 0 16px 64px rgba(0,0,0,0.8);
    opacity: 0;
    transition: opacity 0.5s ease, transform 0.5s ease;
  }
  .popup-img.show { opacity: 1; }

  /* ── Region selection overlay on phone ── */
  .region-overlay {
    position: absolute; left: 80px; top: 50%; transform: translateY(-50%);
    width: 360px; height: 740px;
    border-radius: 36px;
    background: rgba(0,0,0,0.45);
    opacity: 0; transition: opacity 0.4s;
    z-index: 10;
  }
  .region-overlay.show { opacity: 1; }

  .region-banner {
    position: absolute; top: 16px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.9); color: white; padding: 6px 16px;
    border-radius: 8px; font-size: 12px; white-space: nowrap;
  }

  .region-box {
    position: absolute;
    border: 2.5px dashed #6366f1;
    background: rgba(99,102,241,0.2);
    border-radius: 4px;
    opacity: 0; z-index: 11;
  }
  .region-box.show { opacity: 1; }

  /* ── Arrow pointing at road area ── */
  .arrow-hint {
    position: absolute; z-index: 15; opacity: 0;
    transition: opacity 0.5s;
    pointer-events: none;
  }
  .arrow-hint.show { opacity: 1; }
  .arrow-hint-text {
    color: #fbbf24; font-size: 15px; font-weight: 700;
    text-shadow: 0 2px 10px rgba(0,0,0,0.9);
    position: absolute; white-space: nowrap;
  }
  .arrow-hint-line {
    position: absolute; border-left: 2.5px solid #fbbf24;
    border-bottom: 2.5px solid #fbbf24;
  }

  /* ── Toast ── */
  .toast {
    position: absolute; bottom: 120px; left: 260px; transform: translateX(-50%);
    background: #22c55e; color: white; padding: 8px 20px;
    border-radius: 8px; font-size: 13px; font-weight: 600;
    z-index: 300; opacity: 0; transition: opacity 0.3s;
    box-shadow: 0 4px 16px rgba(34,197,94,0.4);
  }
  .toast.show { opacity: 1; }

  /* ── Cursor ── */
  .cursor {
    position: absolute; width: 28px; height: 28px;
    z-index: 9999; pointer-events: none; opacity: 0;
  }
  .cursor svg { width: 28px; height: 28px; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.7)); }

  /* ── Click ripple ── */
  .click-ripple {
    position: absolute; width: 36px; height: 36px;
    border: 2.5px solid rgba(99,102,241,0.9); border-radius: 50%;
    pointer-events: none; z-index: 9998; opacity: 0;
    transform: scale(0);
  }
  .click-ripple.animate {
    animation: ripple 0.5s ease-out forwards;
  }
  @keyframes ripple {
    0% { opacity: 1; transform: scale(0); }
    100% { opacity: 0; transform: scale(2.5); }
  }

  /* ── Step bar ── */
  .step-bar {
    position: absolute; bottom: 0; left: 0; right: 0;
    height: 70px;
    background: linear-gradient(180deg, transparent 0%, rgba(0,0,0,0.95) 50%);
    display: flex; align-items: center; justify-content: center;
    gap: 20px; z-index: 500;
  }
  .step-dots { display: flex; gap: 10px; align-items: center; }
  .step-dot {
    width: 10px; height: 10px; border-radius: 50%;
    background: #3a3a4d; transition: all 0.4s;
  }
  .step-dot.active { background: #6366f1; transform: scale(1.4); box-shadow: 0 0 12px rgba(99,102,241,0.6); }
  .step-dot.done { background: #22c55e; }
  .step-text {
    color: white; font-size: 16px; font-weight: 700;
    min-width: 380px; text-align: center;
    text-shadow: 0 2px 8px rgba(0,0,0,0.5);
  }
  .step-num {
    display: inline-block; width: 26px; height: 26px; line-height: 26px;
    text-align: center; border-radius: 50%; margin-right: 8px;
    background: #6366f1; font-size: 13px;
  }

  /* ── Connecting arrow between phone and popup ── */
  .connect-arrow {
    position: absolute; top: 50%; left: 448px; z-index: 5;
    width: 120px; height: 2px;
    opacity: 0; transition: opacity 0.5s;
  }
  .connect-arrow.show { opacity: 1; }
  .connect-arrow-line {
    width: 100%; height: 2px; background: linear-gradient(90deg, #6366f1, #ec4899);
  }
  .connect-arrow-head {
    position: absolute; right: -6px; top: -5px;
    width: 0; height: 0;
    border-left: 10px solid #ec4899;
    border-top: 6px solid transparent;
    border-bottom: 6px solid transparent;
  }
</style>
</head>
<body>

<!-- Phone with game -->
<div class="phone-frame" id="phoneFrame">
  <img class="game-img" src="demo-game.png" alt="Game">
</div>

<!-- Region overlay on phone -->
<div class="region-overlay" id="regionOverlay">
  <div class="region-banner">拖曳選取路子區域 — ESC 取消</div>
  <div class="region-box" id="regionBox"></div>
</div>

<!-- Arrow hint -->
<div class="arrow-hint" id="arrowHint">
  <div class="arrow-hint-text" style="left:100px; top:545px;">選取路子區域</div>
</div>

<!-- Connecting arrow -->
<div class="connect-arrow" id="connectArrow">
  <div class="connect-arrow-line"></div>
  <div class="connect-arrow-head"></div>
</div>

<!-- Popup images -->
<img class="popup-img" id="popupEmpty" src="demo-popup-empty.png" alt="Popup Empty">
<img class="popup-img" id="popupResult" src="demo-popup-result.png" alt="Popup Result">

<!-- Toast -->
<div class="toast" id="toast">Region saved!</div>

<!-- Cursor -->
<div class="cursor" id="cursor">
  <svg viewBox="0 0 24 24" fill="none">
    <path d="M5 2l14 9.5L12 14l-2.5 8L5 2z" fill="white" stroke="#222" stroke-width="0.8"/>
  </svg>
</div>
<div class="click-ripple" id="ripple"></div>

<!-- Step bar -->
<div class="step-bar">
  <div class="step-dots">
    <div class="step-dot" id="dot0"></div>
    <div class="step-dot" id="dot1"></div>
    <div class="step-dot" id="dot2"></div>
    <div class="step-dot" id="dot3"></div>
  </div>
  <div class="step-text" id="stepText"></div>
</div>

<script>
const cursor = document.getElementById('cursor');
const ripple = document.getElementById('ripple');
const popupEmpty = document.getElementById('popupEmpty');
const popupResult = document.getElementById('popupResult');
const regionOverlay = document.getElementById('regionOverlay');
const regionBox = document.getElementById('regionBox');
const toast = document.getElementById('toast');
const arrowHint = document.getElementById('arrowHint');
const connectArrow = document.getElementById('connectArrow');
const stepText = document.getElementById('stepText');
const dots = [0,1,2,3].map(i => document.getElementById('dot'+i));

// Phone frame position: left=80, width=360, height=740
// Phone top = (800 - 740) / 2 = 30
const PHONE_LEFT = 80;
const PHONE_TOP = 30;
const PHONE_W = 360;
const PHONE_H = 740;

// Game image is 449x920, scaled to fit 360x740
// Scale factor: 360/449 = 0.8017
const SCALE = PHONE_W / 449;

// Road area on original image: approximately x:0-449, y:760-920
// On screen: y = PHONE_TOP + 760 * SCALE = 30 + 609 = 639
//            h = 160 * SCALE = 128
const ROAD_X = PHONE_LEFT + 5;
const ROAD_Y = PHONE_TOP + Math.round(760 * SCALE);
const ROAD_W = PHONE_W - 10;
const ROAD_H = Math.round(160 * SCALE);

// Popup "select region" button on popup-empty image (402x562)
// Button is at roughly y:390-430 in the image
// Popup displayed at: right=140, height=600, so popup width ~ 402*(600/562) = 429
// Popup left edge ~ 1280 - 140 - 429 = 711
// Popup top ~ (800-600)/2 = 100
const POPUP_H = 600;
const POPUP_SCALE = POPUP_H / 562;
const POPUP_W = Math.round(402 * POPUP_SCALE);
const POPUP_LEFT = 1280 - 140 - POPUP_W;
const POPUP_TOP = Math.round((800 - POPUP_H) / 2);
// Button center: x ~ POPUP_LEFT + POPUP_W/2, y ~ POPUP_TOP + 410 * POPUP_SCALE
const BTN_X = POPUP_LEFT + Math.round(POPUP_W / 2);
const BTN_Y = POPUP_TOP + Math.round(400 * POPUP_SCALE);

function wait(ms) { return new Promise(r => setTimeout(r, ms)); }

function moveCursor(x, y, dur = 700) {
  return new Promise(resolve => {
    cursor.style.transition = `left ${dur}ms cubic-bezier(0.4,0,0.2,1), top ${dur}ms cubic-bezier(0.4,0,0.2,1)`;
    cursor.style.left = x + 'px';
    cursor.style.top = y + 'px';
    setTimeout(resolve, dur);
  });
}

function showCursor() { cursor.style.opacity = '1'; }
function hideCursor() { cursor.style.opacity = '0'; }

function clickAt(x, y) {
  ripple.style.left = (x - 18) + 'px';
  ripple.style.top = (y - 18) + 'px';
  ripple.className = 'click-ripple';
  void ripple.offsetWidth;
  ripple.className = 'click-ripple animate';
}

function setStep(n, text) {
  dots.forEach((d, i) => {
    d.className = 'step-dot' + (i < n ? ' done' : i === n ? ' active' : '');
  });
  stepText.innerHTML = `<span class="step-num">${n + 1}</span>${text}`;
}

async function runDemo() {
  // Reset
  popupEmpty.classList.remove('show');
  popupResult.classList.remove('show');
  regionOverlay.classList.remove('show');
  regionBox.classList.remove('show');
  toast.classList.remove('show');
  arrowHint.classList.remove('show');
  connectArrow.classList.remove('show');
  hideCursor();
  cursor.style.transition = 'none';
  cursor.style.left = '640px';
  cursor.style.top = '400px';

  await wait(800);

  // ── Step 1: Show popup ──
  setStep(0, 'Open the RoadAnalyzer extension');
  showCursor();
  await moveCursor(BTN_X, POPUP_TOP + 30, 500);
  await wait(200);
  popupEmpty.classList.add('show');
  await wait(1800);

  // ── Step 2: Click select region button ──
  setStep(1, 'Click "Select Region"');
  await moveCursor(BTN_X, BTN_Y, 600);
  await wait(300);
  clickAt(BTN_X, BTN_Y);
  await wait(500);
  popupEmpty.classList.remove('show');
  await wait(400);

  // ── Step 3: Drag select road area ──
  setStep(2, 'Drag to select the road chart');
  regionOverlay.classList.add('show');
  arrowHint.classList.add('show');
  await wait(1000);
  arrowHint.classList.remove('show');

  // Move to top-left of road area
  const sx = ROAD_X;
  const sy = ROAD_Y;
  const ex = ROAD_X + ROAD_W;
  const ey = ROAD_Y + ROAD_H;

  await moveCursor(sx, sy, 500);
  await wait(200);

  // Set region box start position (relative to region overlay)
  const boxRelX = sx - PHONE_LEFT;
  const boxRelY = sy - PHONE_TOP;
  regionBox.style.left = boxRelX + 'px';
  regionBox.style.top = boxRelY + 'px';
  regionBox.style.width = '0px';
  regionBox.style.height = '0px';
  regionBox.classList.add('show');

  const dragMs = 900;
  const t0 = performance.now();
  await new Promise(resolve => {
    function frame(now) {
      const p = Math.min((now - t0) / dragMs, 1);
      const ease = 1 - Math.pow(1 - p, 3);
      const cx = sx + (ex - sx) * ease;
      const cy = sy + (ey - sy) * ease;
      regionBox.style.width = (cx - sx) + 'px';
      regionBox.style.height = (cy - sy) + 'px';
      cursor.style.transition = 'none';
      cursor.style.left = cx + 'px';
      cursor.style.top = cy + 'px';
      if (p < 1) requestAnimationFrame(frame); else resolve();
    }
    requestAnimationFrame(frame);
  });

  await wait(500);
  regionOverlay.classList.remove('show');
  regionBox.classList.remove('show');
  toast.classList.add('show');
  await wait(1200);
  toast.classList.remove('show');

  // ── Step 4: View results ──
  setStep(3, 'View predictions and analysis!');
  hideCursor();
  await wait(300);
  connectArrow.classList.add('show');
  popupResult.classList.add('show');
  await wait(4000);

  // Fade out
  popupResult.classList.remove('show');
  connectArrow.classList.remove('show');
  await wait(1200);
  runDemo();
}

// Position the connect arrow dynamically
const ca = document.getElementById('connectArrow');
ca.style.top = '50%';
ca.style.left = (PHONE_LEFT + PHONE_W + 8) + 'px';
ca.style.width = (POPUP_LEFT - PHONE_LEFT - PHONE_W - 16) + 'px';
ca.style.transform = 'translateY(-50%)';

runDemo();
</script>
</body>
</html>
